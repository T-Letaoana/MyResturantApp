<div class="reservation">
  <h2>Book a Table</h2>

  <form (ngSubmit)="submit()" #form="ngForm">
    <label>Name</label>
    <input type="text" [ngModel]="name()" (ngModelChange)="name.set($event)" name="name" required>

    <label>Date</label>
    <input type="date" [ngModel]="date()" (ngModelChange)="date.set($event)" name="date" required>

    <label>Number of Guests</label>
    <input type="number" [ngModel]="guests()" (ngModelChange)="guests.set($event)" name="guests" min="1" required>

    <button type="submit">Reserve</button>
  </form>
</div>
